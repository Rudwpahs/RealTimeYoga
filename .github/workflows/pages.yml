name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build web app
        run: python scripts/build_web.py pages

      - name: Publish gh-pages branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/realtimeyoga-pages
          mkdir -p /tmp/realtimeyoga-pages
          cp -R dist/web/. /tmp/realtimeyoga-pages/
          touch /tmp/realtimeyoga-pages/.nojekyll
          cd /tmp/realtimeyoga-pages
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy web app"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
